name: update sidebar

on:
  push:
    branches:
      - main
    paths:
      - 'notes/**/*.md'
      - 'scripts/generate-sidebar.js'

permissions:
  contents: write

jobs:
  update-sidebar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate sidebar
        run: node scripts/generate-sidebar.js

      - name: Commit sidebar changes
        run: |
          if git diff --quiet -- _sidebar.md all-notes.md; then
            echo "Sidebar is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _sidebar.md all-notes.md
          git commit -m "Auto update sidebar"
          git push
